<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Custom Raffle Wheel</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; }
        .container { margin-top: 50px; }
        #canvas { border: 4px solid #333; border-radius: 50%; background: white; }
        button { padding: 10px 20px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #218838; }
        #winner { font-size: 24px; color: #dc3545; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎟️ Live Raffle Wheel 🎟️</h1>
    <canvas id="canvas" width="500" height="500"></canvas>
    <br>
    <button id="spinBtn" onclick="spinWheel()">SPIN THE WHEEL</button>
    <div id="winner"></div>
</div>

<script>
    // ⚠️ REPLACE THESE WITH YOUR OWN SHEET DETAILS
    const SHEET_ID = '1zHX7DCo7cVMNnNZMHtJ97ykat_diMKGHRO_OU6thV6g';
    const SHEET_TITLE = 'Sheet1'; // Name of your tab
    const SHEET_RANGE = 'A2:A100'; // Adjust based on your list size
    
    // Construct the Google Sheets CSV export URL (the easiest way to fetch data without API keys)
    const FULL_URL = `https://docs.google.com/spreadsheets/d/${1zHX7DCo7cVMNnNZMHtJ97ykat_diMKGHRO_OU6thV6g}/gviz/tq?tqx=out:csv&sheet=${SHEET_TITLE}&range=${SHEET_RANGE}`;

    let participants = [];
    let currentAngle = 0;

    // Fetch names from Google Sheet on load
    async function loadNames() {
        try {
            const response = await fetch(FULL_URL);
            const data = await response.text();
            
            // Clean up CSV data into a clean array of names
            participants = data.split('\n').map(name => name.replace(/['"]+/g, '').trim()).filter(Boolean);
            
            if (participants.length === 0) {
                alert("No names found in the Google Sheet!");
            } else {
                drawWheel();
            }
        } catch (error) {
            console.error("Error fetching Google Sheet data:", error);
        }
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    const center = size / 2;

    function drawWheel() {
        const numSegments = participants.length;
        const arc = (2 * Math.PI) / numSegments;

        ctx.clearRect(0, 0, size, size);

        participants.forEach((name, i) => {
            const angle = currentAngle + i * arc;
            
            // Draw slice
            ctx.beginPath();
            ctx.fillStyle = i % 2 === 0 ? '#4e73df' : '#1cc88a'; // Alternate colors
            ctx.moveTo(center, center);
            ctx.arc(center, center, center - 10, angle, angle + arc);
            ctx.lineTo(center, center);
            ctx.fill();
            ctx.stroke();

            // Draw text
            ctx.save();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.translate(center, center);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = 'right';
            ctx.fillText(name, center - 30, 5);
            ctx.restore();
        });
        
        // Draw the center pin indicator
        ctx.beginPath();
        ctx.fillStyle = '#333';
        ctx.arc(center, center, 20, 0, 2 * Math.PI);
        ctx.fill();
    }

    function spinWheel() {
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('winner').innerText = "";
        
        const spinAngle = Math.random() * 1000 + 2000; // Random big rotation
        const duration = 4000; // 4 seconds spin
        const start = performance.now();

        function animate(now) {
            const elapsed = now - start;
            const progress = Math.min(elapsed / duration, 1);
            
            // Ease out cubic effect (slow down gradually)
            const easeOut = 1 - Math.pow(1 - progress, 3);
            
            currentAngle = (easeOut * spinAngle * Math.PI) / 180;
            drawWheel();

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                determineWinner();
                document.getElementById('spinBtn').disabled = false;
            }
        }
        requestAnimationFrame(animate);
    }

    function determineWinner() {
        const numSegments = participants.length;
        const arc = (2 * Math.PI) / numSegments;
        
        // Normalize angle to find which segment lands at the pointer (top/right depending on setup)
        // In standard canvas, 0 radians is at 3 o'clock.
        let normalizedAngle = (currentAngle % (2 * Math.PI));
        let index = Math.floor((2 * Math.PI - normalizedAngle) / arc) % numSegments;
        
        // Visual indicator fix if needed, but this calculates based on rotation
        const winner = participants[index];
        document.getElementById('winner').innerText = `🎉 Winner: ${winner} 🎉`;
    }

    // Initialize
    loadNames();
</script>

</body>
</html>
